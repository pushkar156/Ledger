<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- SEO Standard Meta Tags -->
    <title>Ledger - Daily Expense Tracker</title>
    <meta name="description" content="Ledger is a calm, precise, and fast personal finance and budget tracker. Monitor daily spending, configure recurring auto-bills, and track savings balances seamlessly." />
    <meta name="keywords" content="ledger, finance tracker, budget tracker, expense tracker, personal finance app, money manager, savings log, bill organizer, budget planner, finance PWA" />

    <!-- Open Graph / Facebook Social Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ledger-expense.vercel.app/" />
    <meta property="og:title" content="Ledger - Daily Expense Tracker" />

    <!-- Twitter Social Cards -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://ledger-expense.vercel.app/" />
    <meta property="twitter:title" content="Ledger - Daily Expense Tracker" />
    <meta property="twitter:description" content="Monitor your daily spending, schedule bills, and optimize savings with a calm, precise, and high-fidelity interface." />
    <meta property="twitter:image" content="https://ledger-expense.vercel.app/favicon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // Check for updates on load/interval
            setInterval(() => {
              reg.update();
            }, 60 * 1000); // Check for service worker updates every minute

            // Listen for waiting service worker
            const handleWaiting = (sw) => {
              window.dispatchEvent(new CustomEvent('swUpdateAvailable', { detail: sw }));
            };

            if (reg.waiting) {
              handleWaiting(reg.waiting);
            }

            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  handleWaiting(newWorker);
                }
              });
            });
          }).catch((err) => {
            console.warn('PWA service worker registration failed:', err);
          });
        });

        // Reload the page when the active service worker changes
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
