<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- SEO Standard Meta Tags -->
    <title>Ledger - Daily Expense Tracker</title>
    <meta name="description" content="Ledger is a calm, precise, and fast personal finance and budget tracker. Monitor daily spending, configure recurring auto-bills, and track savings balances seamlessly." />
    <meta name="keywords" content="ledger, finance tracker, budget tracker, expense tracker, personal finance app, money manager, savings log, bill organizer, budget planner, finance PWA" />
    <meta name="author" content="Pushkar" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ledger-daily.vercel.app/" />

    <!-- Open Graph / Facebook Social Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ledger-daily.vercel.app/" />
    <meta property="og:title" content="Ledger - Daily Expense Tracker" />
    <meta property="og:description" content="Monitor your daily spending, schedule bills, and optimize savings with a calm, precise, and high-fidelity interface." />
    <meta property="og:image" content="https://ledger-daily.vercel.app/favicon.png" />

    <!-- Twitter Social Cards -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://ledger-daily.vercel.app/" />
    <meta property="twitter:title" content="Ledger - Daily Expense Tracker" />
    <meta property="twitter:description" content="Monitor your daily spending, schedule bills, and optimize savings with a calm, precise, and high-fidelity interface." />
    <meta property="twitter:image" content="https://ledger-daily.vercel.app/favicon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => {
            console.warn('PWA service worker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
