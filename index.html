<!doctype html>
<html lang="en">
  <head>
    <!-- Asset Load Error Fail-Safe Recovery script - Must run first! -->
    <script>
      // Immediately listen for global module failures
      window.addEventListener('error', function(e) {
        const targetElement = e.target || e.srcElement;
        const src = targetElement ? (targetElement.src || targetElement.href) : '';
        const isAssetError = src && (src.indexOf('/assets/') > -1 || src.indexOf('.js') > -1 || src.indexOf('.css') > -1);
        
        // Match chunk load or fetching errors
        const isChunkFailed = e.message && (
          e.message.indexOf('Failed to fetch dynamically imported module') > -1 ||
          e.message.indexOf('error loading dynamically imported module') > -1 ||
          e.message.indexOf('ChunkLoadError') > -1
        );

        if (isAssetError || isChunkFailed) {
          console.warn('Stale build asset detected. Purging cache and refreshing...');
          if ('caches' in window) {
            caches.keys().then(function(names) {
              return Promise.all(names.map(function(name) { return caches.delete(name); }));
            }).then(function() {
              window.location.reload(true);
            }).catch(function() {
              window.location.reload(true);
            });
          } else {
            window.location.reload(true);
          }
        }
      }, true);

      // Handle unhandled promise rejections (often thrown by dynamically imported chunks failing)
      window.addEventListener('unhandledrejection', function(e) {
        const reason = e.reason ? (e.reason.message || String(e.reason)) : '';
        if (reason.indexOf('dynamically imported module') > -1 || reason.indexOf('ChunkLoadError') > -1) {
          console.warn('Stale module promise rejection detected. Purging cache and refreshing...');
          if ('caches' in window) {
            caches.keys().then(function(names) {
              return Promise.all(names.map(function(name) { return caches.delete(name); }));
            }).then(function() {
              window.location.reload(true);
            }).catch(function() {
              window.location.reload(true);
            });
          } else {
            window.location.reload(true);
          }
        }
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // Check for updates on load/interval
            setInterval(() => {
              reg.update();
            }, 60 * 1000); // Check for service worker updates every minute

            // Listen for waiting service worker
            const handleWaiting = (sw) => {
              window.dispatchEvent(new CustomEvent('swUpdateAvailable', { detail: sw }));
            };

            if (reg.waiting) {
              handleWaiting(reg.waiting);
            }

            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  handleWaiting(newWorker);
                }
              });
            });
          }).catch((err) => {
            console.warn('PWA service worker registration failed:', err);
          });
        });

        // Reload the page when the active service worker changes
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      }
    </script>
